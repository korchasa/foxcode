<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITLE</title>
    <style>
      :root {
        --font:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        --bg: #fff;
        --surface: #f9fafb;
        --code-bg: #f3f4f6;
        --border: #e5e7eb;
        --line: #d1d5db;
        --muted: #9ca3af;
        --line-edge: #b0b8c4;
        --text: #111827;
        --text-2: #374151;
        --text-3: #4b5563;
        --sub: #6b7280;
        --accent: #2563eb;
        --accent-bg: rgba(37, 99, 235, 0.05);
        --hover-bg: rgba(0, 0, 0, 0.04);
        --hover-bg-subtle: rgba(0, 0, 0, 0.02);
        --insp: 380px;
        --r: 8px;
        --r-sm: 4px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .toolbar {
        height: 52px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 12px;
        flex-shrink: 0;
      }
      .title {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.01em;
        flex: 1;
      }
      .doc-link {
        font-size: 12px;
        color: var(--accent);
        text-decoration: none;
        border: 1px solid rgba(37, 99, 235, 0.4);
        padding: 4px 8px;
        border-radius: var(--r-sm);
        font-weight: 600;
      }
      .doc-link:hover {
        background: var(--accent-bg);
      }
      .counter {
        font-size: 12px;
        color: var(--sub);
        font-variant-numeric: tabular-nums;
      }
      .nav-btns {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 16px;
        border-top: 1px solid var(--border);
      }
      .btn-next {
        background: var(--text);
        color: white;
        border: none;
        padding: 4px 12px;
        border-radius: var(--r-sm);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: var(--font);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-next:hover {
        background: var(--accent);
      }
      .btn-next kbd {
        background: rgba(255, 255, 255, 0.2);
        padding: 0 4px;
        border-radius: 2px;
        font-size: 11px;
        font-family: var(--font);
      }
      .btn-branch {
        background: white;
        color: var(--text);
        border: 1.5px solid var(--border);
        padding: 4px 12px;
        border-radius: var(--r-sm);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: var(--font);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-branch:hover {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .btn-branch kbd {
        background: rgba(0, 0, 0, 0.08);
        padding: 0 4px;
        border-radius: 2px;
        font-size: 11px;
        font-family: var(--font);
      }
      .btn-branch:hover kbd {
        background: rgba(255, 255, 255, 0.2);
      }
      .workspace {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      .diagram-wrap {
        flex: 1;
        overflow: auto;
        background: var(--surface);
        display: flex;
        justify-content: center;
        padding: 32px;
      }
      svg {
        display: block;
        background: white;
        border: 1px solid var(--border);
        border-radius: var(--r);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      }
      .inspector {
        width: var(--insp);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: white;
      }
      .insp-hd {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }
      .insp-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--sub);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 4px;
      }
      .insp-title {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.3;
      }
      .insp-body {
        flex: 1;
        overflow: auto;
      }
      .insp-desc {
        padding: 16px;
        font-size: 13px;
        line-height: 1.65;
        color: var(--text-3);
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .insp-details {
        padding: 16px;
        font-size: 13px;
        line-height: 1.6;
        color: var(--text-2);
      }
      .insp-details.empty {
        display: none;
      }
      .insp-details p {
        margin: 0 0 8px;
      }
      .insp-details p:last-child {
        margin-bottom: 0;
      }
      .insp-details h4 {
        font-size: 11px;
        font-weight: 700;
        margin: 16px 0 4px;
        color: var(--text);
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .insp-details h4:first-child {
        margin-top: 0;
      }
      .insp-details pre {
        font-family: var(--mono);
        font-size: 11px;
        background: var(--code-bg);
        padding: 8px 12px;
        border-radius: var(--r-sm);
        overflow-x: auto;
        margin: 8px 0;
        white-space: pre-wrap;
        line-height: 1.5;
      }
      .insp-details code {
        font-family: var(--mono);
        font-size: 12px;
        background: var(--code-bg);
        padding: 0 4px;
        border-radius: 2px;
      }
      .insp-details ul, .insp-details ol {
        margin: 8px 0 8px 20px;
      }
      .insp-details li {
        margin: 4px 0;
      }
      .insp-details strong {
        font-weight: 700;
      }
      .insp-details .jk {
        color: #a11;
        font-weight: 600;
      }
      .insp-details .js {
        color: #1a5;
      }
      .insp-details .jn {
        color: #161;
      }
      .insp-details .jb {
        color: #b62;
      }
      .insp-details .jz {
        color: #999;
      }

      .node-group {
        cursor: pointer;
      }
      .node-rect {
        fill: white;
        stroke: var(--muted);
        stroke-width: 1.5;
        transition: stroke 0.15s, fill 0.15s, stroke-width 0.15s;
      }
      .node-group:hover .node-rect {
        stroke: var(--text);
        stroke-width: 2;
        fill: var(--hover-bg-subtle);
      }
      .node-group.active .node-rect {
        stroke: var(--accent);
        stroke-width: 2;
        fill: var(--accent-bg);
      }
      .node-state {
        fill: var(--surface);
      }
      .node-start, .node-end {
        fill: var(--text);
        stroke: var(--text);
      }
      .node-group.active .node-start, .node-group.active .node-end {
        fill: var(--accent);
        stroke: var(--accent);
      }
      .node-end-ring {
        fill: none;
        stroke: white;
        stroke-width: 2;
      }
      .node-text {
        font-size: 12px;
        font-weight: 600;
        text-anchor: middle;
        fill: var(--text);
        font-family: var(--font);
        dominant-baseline: middle;
      }
      .node-group.active .node-text {
        fill: var(--accent);
      }
      .node-text-inv {
        font-size: 11px;
        font-weight: 700;
        text-anchor: middle;
        fill: white;
        font-family: var(--font);
        dominant-baseline: middle;
      }

      .edge-group {
        cursor: pointer;
      }
      .edge-path {
        fill: none;
        stroke: var(--line-edge);
        stroke-width: 1.5;
        transition: stroke 0.15s, stroke-width 0.15s;
      }
      .edge-group:hover .edge-path {
        stroke: var(--text);
        stroke-width: 2.5;
      }
      .edge-group.active .edge-path {
        stroke: var(--accent);
        stroke-width: 2.5;
      }
      .edge-hit {
        fill: none;
        stroke: transparent;
        stroke-width: 20;
        cursor: pointer;
      }
      .edge-label {
        font-size: 12px;
        font-weight: 700;
        fill: var(--text-2);
        font-family: var(--font);
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .edge-label-bg {
        fill: white;
        stroke: var(--border);
        stroke-width: 1;
      }
      .edge-group:hover .edge-label {
        fill: var(--text);
      }
      .edge-group:hover .edge-label-bg {
        stroke: var(--muted);
      }
      .edge-group.active .edge-label {
        fill: var(--accent);
      }
      .edge-group.active .edge-label-bg {
        stroke: var(--accent);
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--line);
        border-radius: var(--r-sm);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted);
      }
    </style>
    <script
      src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3/dist/svg.min.js"
    ></script>
  </head>
  <body>
    <div class="toolbar">
      <div class="title" id="doc-title"></div>
      <div class="counter" id="counter"></div>
    </div>
    <div class="workspace">
      <div class="diagram-wrap" id="diagram"></div>
      <div class="inspector">
        <div class="insp-hd">
          <div class="insp-label">Details</div>
          <div class="insp-title" id="insp-title">
            Select a node or transition
          </div>
        </div>
        <div class="insp-body">
          <div class="insp-desc" id="insp-desc">
            Click any node or edge to see what happens at this stage.
          </div>
          <div class="insp-details empty" id="insp-det"></div>
          <div class="nav-btns" id="nav-btns"></div>
        </div>
      </div>
    </div>
    <script>
      // === DATA ===
      const TITLE = "Kubernetes Pod Lifecycle";
      const DOC_URL =
        "https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/";

      const NODES = [
        {
          id: "pending",
          type: "start",
          label: "Pending",
          x: 320,
          y: 50,
          description:
            "Pod object created in etcd. Waiting in the scheduler queue for a node assignment.",
          details: `<h4>Common reasons for staying Pending</h4>
<ul>
<li>Insufficient CPU or memory on any node</li>
<li>No node matches <code>nodeSelector</code> or affinity rules</li>
<li>PersistentVolumeClaim not bound</li>
<li>ResourceQuota exceeded in namespace</li>
</ul>
<p>Check with <code>kubectl describe pod &lt;name&gt;</code> — the Events section shows why scheduling failed.</p>`,
        },
        {
          id: "scheduling",
          type: "action",
          label: "Scheduling",
          x: 320,
          y: 160,
          description:
            "kube-scheduler selects the optimal node through filtering (exclude ineligible) then scoring (rank remaining).",
          details: `<h4>Scoring factors</h4>
<ul>
<li>LeastRequestedPriority — spread load across nodes</li>
<li>NodeAffinityPriority — honor soft affinity preferences</li>
<li>PodTopologySpread — distribute across zones</li>
<li>InterPodAffinity — co-locate related pods</li>
</ul>
<pre>spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: disktype
            operator: In
            values: ["ssd"]</pre>`,
        },
        {
          id: "init",
          type: "action",
          label: "Init Containers",
          x: 320,
          y: 270,
          description:
            "Init containers run sequentially on the assigned node. Each must complete successfully before the next starts. They share volumes with app containers but run separate images.",
          details: `<h4>Use cases</h4>
<ul>
<li>Wait for a dependency: <code>until nslookup mydb; do sleep 2; done</code></li>
<li>Clone config from git or seed a database</li>
<li>Register with a service mesh sidecar</li>
<li>Set filesystem permissions on shared volumes</li>
</ul>
<pre>initContainers:
- name: wait-for-db
  image: busybox:1.36
  command: ['sh', '-c',
    'until nslookup mydb.default.svc; do sleep 2; done']</pre>`,
        },
        {
          id: "init_ok",
          type: "decision",
          label: "Init OK?",
          x: 320,
          y: 390,
          description:
            "If any init container exits with a non-zero code, the pod's restart policy applies. Init containers must all succeed before app containers start.",
          details:
            `<p>A failed init container is the most common cause of pods stuck in <code>Init:CrashLoopBackOff</code>.</p>
<p>Unlike app containers, init containers always run to completion — they don't have liveness or readiness probes.</p>
<h4>Debugging</h4>
<pre>kubectl logs &lt;pod&gt; -c &lt;init-container-name&gt;
kubectl describe pod &lt;pod&gt; | grep -A 5 "Init Containers"</pre>`,
        },
        {
          id: "pulling",
          type: "action",
          label: "Pull & Create",
          x: 320,
          y: 510,
          description:
            "kubelet pulls container images (if not cached) and creates containers via the container runtime (containerd / CRI-O).",
          details: `<h4>Image pull policies</h4>
<ul>
<li><code>IfNotPresent</code> — default for tagged images, uses local cache</li>
<li><code>Always</code> — default for <code>:latest</code>, checks registry every time</li>
<li><code>Never</code> — only use pre-pulled images on the node</li>
</ul>
<p><code>ErrImagePull</code> and <code>ImagePullBackOff</code> here usually mean: wrong image name, missing <code>imagePullSecrets</code>, or registry network issues.</p>`,
        },
        {
          id: "running",
          type: "state",
          label: "Running",
          x: 320,
          y: 620,
          description:
            "All containers are started. The pod is Running but not necessarily Ready — probes haven't been evaluated yet.",
          details: `<h4>Container lifecycle hooks</h4>
<pre>lifecycle:
  postStart:
    httpGet:
      path: /healthz
      port: 8080
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 15"]</pre>
<p><code>postStart</code> runs immediately after creation (parallel with entrypoint — no ordering guarantee). <code>preStop</code> runs before SIGTERM — useful for connection draining.</p>`,
        },
        {
          id: "probes",
          type: "decision",
          label: "Probes OK?",
          x: 320,
          y: 740,
          description:
            "kubelet evaluates three independent probe types. Startup probe gates liveness/readiness. Liveness failure kills the container. Readiness failure removes from traffic.",
          details: `<ul>
<li><strong>startupProbe</strong> — disables other probes until app starts (for slow-starting apps)</li>
<li><strong>livenessProbe</strong> — is the process healthy? Failure triggers container restart</li>
<li><strong>readinessProbe</strong> — can it serve traffic? Failure removes from Service endpoints</li>
</ul>
<pre>livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3</pre>
<p>Three consecutive failures at 10s intervals = kill after 45s from start.</p>`,
        },
        {
          id: "ready",
          type: "state",
          label: "Ready",
          x: 520,
          y: 740,
          description:
            "Pod passes readiness probe and is added to Service Endpoints. kube-proxy programs iptables/IPVS rules to route traffic here.",
          details: `<h4>What Ready means</h4>
<ul>
<li>All containers are running</li>
<li>All readiness probes pass</li>
<li>All readinessGates (if configured) are True</li>
</ul>
<p>A pod can flip between Ready and not-Ready during its lifetime. A failing readiness probe temporarily removes it from traffic rotation without restarting the container — unlike a liveness probe failure.</p>`,
        },
        {
          id: "terminating",
          type: "action",
          label: "Terminating",
          x: 520,
          y: 870,
          description:
            "Triggered by scale-down, rolling update, node drain, or manual deletion. The pod gets a grace period to shut down cleanly.",
          details: `<h4>Termination sequence</h4>
<ol>
<li>Pod removed from Service endpoints (stops receiving new traffic)</li>
<li><code>preStop</code> hook executes (if defined)</li>
<li>SIGTERM sent to PID 1 in each container</li>
<li>Wait up to <code>terminationGracePeriodSeconds</code> (default: 30s)</li>
<li>SIGKILL sent to any remaining processes</li>
</ol>
<p><strong>Race condition:</strong> traffic may still arrive briefly after SIGTERM because endpoint removal is async. The <code>preStop: sleep 5</code> pattern gives kube-proxy time to update its rules.</p>`,
        },
        {
          id: "succeeded",
          type: "end",
          label: "Done",
          x: 520,
          y: 990,
          description:
            "All containers exited with code 0. For Jobs/CronJobs this is the desired end state.",
          details:
            `<p>For Deployments with <code>restartPolicy: Always</code>, exit code 0 still triggers a restart — the pod is expected to run indefinitely.</p>
<p>Only Jobs and CronJobs (with <code>restartPolicy: OnFailure</code> or <code>Never</code>) treat this as a final state.</p>`,
        },
        {
          id: "restart",
          type: "decision",
          label: "Restart?",
          x: 120,
          y: 620,
          description:
            "kubelet evaluates the pod's restartPolicy to decide whether to restart the failed container.",
          details: `<ul>
<li><code>Always</code> — restart on any exit (default for Deployments, StatefulSets)</li>
<li><code>OnFailure</code> — restart only on non-zero exit code (common for Jobs)</li>
<li><code>Never</code> — no restart, let the pod fail (for debugging or one-shot tasks)</li>
</ul>
<p>Restart count is per-container and visible in <code>kubectl get pod</code> RESTARTS column and <code>kubectl describe pod</code>.</p>`,
        },
        {
          id: "backoff",
          type: "state",
          label: "CrashLoopBackOff",
          x: 120,
          y: 780,
          description:
            "After repeated crashes, kubelet applies exponential backoff: 10s, 20s, 40s, 80s, 160s, capped at 5 minutes between restart attempts.",
          details: `<h4>Debugging CrashLoopBackOff</h4>
<pre># Logs from the most recent crashed container
kubectl logs &lt;pod&gt; --previous

# Events, exit codes, restart count
kubectl describe pod &lt;pod&gt;

# Shell into the container (if it starts briefly)
kubectl exec -it &lt;pod&gt; -- sh</pre>
<p><strong>Common causes:</strong> missing ConfigMap/Secret, wrong entrypoint command, port already in use, OOMKill (check <code>lastState.terminated.reason</code>).</p>`,
        },
        {
          id: "failed",
          type: "end",
          label: "Failed",
          x: 120,
          y: 940,
          description:
            "Pod permanently failed. No more restarts. Happens with restartPolicy: Never, or when a Job exceeds backoffLimit.",
          details:
            `<p>For Jobs with <code>backoffLimit: 6</code> (default), the pod is marked Failed after 6 restart attempts. The Job controller may create a replacement pod depending on <code>completions</code> and <code>parallelism</code>.</p>
<p>For pods with <code>activeDeadlineSeconds</code>, exceeding the deadline also results in permanent failure regardless of restart policy.</p>`,
        },
      ];

      const EDGES = [
        {
          from: "pending",
          to: "scheduling",
          label: "",
          description:
            "Pod enters the scheduler queue. Higher-priority pods are scheduled first and can preempt lower-priority ones.",
          details:
            `<p>Priority is set via <code>priorityClassName</code>. Preemption evicts lower-priority pods to make room — their owners (Deployments, etc.) recreate them elsewhere.</p>`,
        },
        {
          from: "scheduling",
          to: "init",
          label: "",
          description:
            "Node assigned. kubelet on the target node picks up the pod spec and begins the init phase.",
          details:
            `<p>The node assignment is recorded in <code>pod.spec.nodeName</code>. Once set, it cannot change — to move a pod, delete and recreate it.</p>`,
        },
        {
          from: "init",
          to: "init_ok",
          label: "",
          description:
            "Init containers run one by one. First failure stops the sequence.",
          details:
            `<p>Each init container must exit 0 before the next one starts. They run in the order defined in <code>spec.initContainers[]</code>.</p>`,
        },
        {
          from: "init_ok",
          to: "pulling",
          label: "ok",
          fromSide: "bottom",
          description:
            "All init containers completed successfully. Proceed to app containers.",
          details:
            `<p>Volumes populated by init containers are now available to app containers.</p>`,
        },
        {
          from: "init_ok",
          to: "restart",
          label: "fail",
          fromSide: "left",
          toSide: "right",
          description:
            "Init container exited with non-zero code. RestartPolicy determines what happens next.",
          details:
            `<p>The pod status shows <code>Init:Error</code> or <code>Init:CrashLoopBackOff</code> depending on how many times it has failed.</p>`,
        },
        {
          from: "pulling",
          to: "running",
          label: "",
          description:
            "Images pulled, containers created and started by the container runtime.",
          details:
            `<p>Container creation includes: applying resource limits (cgroups), mounting volumes, setting environment variables, configuring network namespace.</p>`,
        },
        {
          from: "running",
          to: "probes",
          label: "",
          description:
            "kubelet begins probe checks after initialDelaySeconds. Until startup probe passes, liveness and readiness are disabled.",
          details:
            `<p>If no startup probe is defined, liveness and readiness probes start immediately after <code>initialDelaySeconds</code>.</p>`,
        },
        {
          from: "probes",
          to: "ready",
          label: "pass",
          fromSide: "right",
          toSide: "left",
          description:
            "All probes pass. Pod is added to Service endpoints and begins receiving traffic.",
          details:
            `<p>The Endpoints controller watches pod readiness and updates the Endpoints object. kube-proxy picks up the change and updates iptables/IPVS rules.</p>`,
        },
        {
          from: "probes",
          to: "restart",
          label: "fail",
          fromSide: "left",
          toSide: "right",
          description:
            "Liveness probe exceeded failureThreshold. kubelet kills the container.",
          details:
            `<p>Only the liveness probe triggers a restart. Readiness probe failure just removes the pod from Service endpoints without killing it.</p>`,
        },
        {
          from: "ready",
          to: "terminating",
          label: "delete",
          description:
            "Deletion requested: scale-down, rolling update, node drain, or manual kubectl delete.",
          details:
            `<p>The pod enters Terminating state. Its <code>deletionTimestamp</code> is set and it is removed from Service endpoints.</p>`,
        },
        {
          from: "terminating",
          to: "succeeded",
          label: "",
          description: "All containers exited cleanly within the grace period.",
          details:
            `<p>If containers don't exit within <code>terminationGracePeriodSeconds</code>, they receive SIGKILL. The exit is still recorded as terminated, not succeeded.</p>`,
        },
        {
          from: "restart",
          to: "pulling",
          label: "Always",
          fromSide: "top",
          toSide: "left",
          description:
            "restartPolicy: Always — kubelet restarts the container immediately (or after backoff if repeated).",
          details:
            `<p>First restart is immediate. Subsequent rapid restarts trigger exponential backoff (10s, 20s, 40s, ... up to 5 minutes).</p>`,
        },
        {
          from: "restart",
          to: "backoff",
          label: "repeated",
          fromSide: "bottom",
          description:
            "Multiple rapid crashes trigger exponential backoff. Pod enters CrashLoopBackOff state.",
          details:
            `<p>Backoff resets to 0 after a container runs successfully for 10 minutes (<code>stableRestartThreshold</code>).</p>`,
        },
        {
          from: "backoff",
          to: "pulling",
          label: "retry",
          fromSide: "top",
          toSide: "left",
          description:
            "Backoff period elapsed. kubelet retries container creation.",
          details:
            `<p>Each retry doubles the wait time: 10s, 20s, 40s, 80s, 160s, 300s (cap). The pod stays in CrashLoopBackOff between retries.</p>`,
        },
        {
          from: "backoff",
          to: "failed",
          label: "limit",
          fromSide: "bottom",
          description:
            "For Jobs: backoffLimit exceeded. Pod is marked permanently Failed.",
          details:
            `<p>Default <code>backoffLimit</code> is 6. After that, the Job is marked Failed and no more pods are created for it. For Deployments, there is no limit — CrashLoopBackOff continues indefinitely.</p>`,
        },
      ];
      // === END DATA ===

      const NW = 140, NH = 44, DW = 60, DH = 44, CR = 22;
      const nodesById = Object.fromEntries(NODES.map((n) => [n.id, n]));
      const pad = 80;
      const svgW = Math.max(...NODES.map((n) => n.x)) + pad + 40;
      const svgH = Math.max(...NODES.map((n) => n.y)) + pad;

      // SVG.js rendering
      const draw = SVG().addTo("#diagram").size(svgW, svgH);
      const arr = draw.marker(8, 6, (add) => {
        add.polygon("0 0, 8 3, 0 6").fill("#b0b8c4");
      }).ref(7, 3).attr("orient", "auto");
      const arrA = draw.marker(8, 6, (add) => {
        add.polygon("0 0, 8 3, 0 6").fill("#2563eb");
      }).ref(7, 3).attr("orient", "auto");

      function attach(node, side) {
        const { x, y, type } = node;
        if (type === "action" || type === "state") {
          if (side === "top") return [x, y - NH / 2];
          if (side === "bottom") return [x, y + NH / 2];
          if (side === "left") return [x - NW / 2, y];
          if (side === "right") return [x + NW / 2, y];
        }
        if (type === "decision") {
          if (side === "top") return [x, y - DH];
          if (side === "bottom") return [x, y + DH];
          if (side === "left") return [x - DW, y];
          if (side === "right") return [x + DW, y];
        }
        if (type === "start" || type === "end") {
          if (side === "top") return [x, y - CR];
          if (side === "bottom") return [x, y + CR];
          if (side === "left") return [x - CR, y];
          if (side === "right") return [x + CR, y];
        }
        return [x, y];
      }

      function edgePath(x1, y1, fSide, x2, y2, tSide) {
        const dx = Math.abs(x2 - x1), dy = Math.abs(y2 - y1);
        const cv = Math.max(50, Math.sqrt(dx * dx + dy * dy) * 0.4);
        let cx1 = x1, cy1 = y1, cx2 = x2, cy2 = y2;
        if (fSide === "bottom") cy1 += cv;
        else if (fSide === "top") cy1 -= cv;
        else if (fSide === "right") cx1 += cv;
        else if (fSide === "left") cx1 -= cv;
        if (tSide === "top") cy2 -= cv;
        else if (tSide === "bottom") cy2 += cv;
        else if (tSide === "right") cx2 += cv;
        else if (tSide === "left") cx2 -= cv;
        return {
          d: `M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`,
          cx1,
          cy1,
          cx2,
          cy2,
        };
      }

      let selType = null, selIdx = -1;
      const nodeGroups = [], edgeGroups = [];
      const elT = document.getElementById("insp-title"),
        elD = document.getElementById("insp-desc");
      const elDet = document.getElementById("insp-det"),
        elC = document.getElementById("counter");

      function renderDetails(det) {
        if (!det) return null;
        if (typeof det === "string") return det;
        if (Object.keys(det).length === 0) return null;
        let s = JSON.stringify(det, null, 2).replace(/&/g, "&amp;")
          .replace(/</g, "&lt;").replace(/>/g, "&gt;");
        s = s.replace(
          /("(?:\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(?:\s*:)?|\b(?:true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g,
          (m) => {
            const c = /^"/.test(m)
              ? (/:$/.test(m) ? "jk" : "js")
              : /true|false/.test(m)
              ? "jb"
              : /null/.test(m)
              ? "jz"
              : "jn";
            return `<span class="${c}">${m}</span>`;
          },
        );
        return "<pre>" + s + "</pre>";
      }

      function showInsp(title, desc, details) {
        elT.textContent = title;
        elD.textContent = desc || "";
        const html = renderDetails(details);
        if (html) {
          elDet.innerHTML = html;
          elDet.classList.remove("empty");
        } else {
          elDet.innerHTML = "";
          elDet.classList.add("empty");
        }
      }

      function clearActive() {
        nodeGroups.forEach((g) => g.removeClass("active"));
        edgeGroups.forEach(({ g, path }) => {
          g.removeClass("active");
          path.marker("end", arr);
        });
      }

      function selectNode(idx) {
        clearActive();
        nodeGroups[idx].addClass("active");
        selType = "node";
        selIdx = idx;
        const n = NODES[idx];
        showInsp(n.label, n.description, n.details);
        elC.textContent = `node ${idx + 1} / ${NODES.length}`;
      }

      function selectEdge(idx) {
        clearActive();
        const { g, path } = edgeGroups[idx];
        g.addClass("active");
        path.marker("end", arrA);
        selType = "edge";
        selIdx = idx;
        const e = EDGES[idx];
        showInsp(
          `${nodesById[e.from]?.label || e.from} \u2192 ${
            nodesById[e.to]?.label || e.to
          }`,
          e.description,
          e.details,
        );
        elC.textContent = `edge ${idx + 1} / ${EDGES.length}`;
      }

      // Draw edges (behind nodes)
      EDGES.forEach((edge, i) => {
        const src = nodesById[edge.from], tgt = nodesById[edge.to];
        const fS = edge.fromSide || "bottom", tS = edge.toSide || "top";
        const [x1, y1] = attach(src, fS), [x2, y2] = attach(tgt, tS);
        const { d, cx1, cy1, cx2, cy2 } = edgePath(
          x1,
          y1,
          fS,
          x2,
          y2,
          tS,
        );

        const g = draw.group().addClass("edge-group");
        const path = g.path(d).fill("none").addClass("edge-path")
          .marker("end", arr);
        g.path(d).fill("none").addClass("edge-hit").click(() => selectEdge(i));

        if (edge.label) {
          const t = 0.5, u = 1 - t;
          const mx = u * u * u * x1 + 3 * u * u * t * cx1 +
            3 * u * t * t * cx2 + t * t * t * x2;
          const my = u * u * u * y1 + 3 * u * u * t * cy1 +
            3 * u * t * t * cy2 + t * t * t * y2;
          const tw = edge.label.length * 7 + 12;
          g.rect(tw, 18).move(mx - tw / 2, my - 9).radius(3).addClass(
            "edge-label-bg",
          );
          g.plain(edge.label).attr({ x: mx, y: my }).addClass(
            "edge-label",
          );
        }

        edgeGroups.push({ g, path });
      });

      // Draw nodes on top
      NODES.forEach((node, i) => {
        const { x, y, type, label } = node;
        const g = draw.group().addClass("node-group");
        g.click(() => selectNode(i));

        if (type === "action") {
          g.rect(NW, NH).move(x - NW / 2, y - NH / 2).radius(8)
            .addClass("node-rect");
          g.plain(label).attr({ x, y }).addClass("node-text");
        } else if (type === "state") {
          g.rect(NW, NH).move(x - NW / 2, y - NH / 2).radius(8)
            .addClass("node-rect node-state");
          g.plain(label).attr({ x, y }).addClass("node-text");
        } else if (type === "decision") {
          g.polygon(
            `${x},${y - DH} ${x + DW},${y} ${x},${y + DH} ${x - DW},${y}`,
          ).addClass("node-rect");
          g.plain(label).attr({ x, y }).addClass("node-text");
        } else if (type === "start") {
          g.circle(CR * 2).center(x, y).addClass("node-start");
          g.plain(label).attr({ x, y }).addClass("node-text-inv");
        } else if (type === "end") {
          g.circle(CR * 2).center(x, y).addClass("node-start");
          g.circle((CR - 5) * 2).center(x, y).addClass("node-end-ring");
          g.plain(label).attr({ x, y }).addClass("node-text-inv");
        }

        nodeGroups.push(g);
      });

      // Topology-aware navigation: node -> edge -> node, with branching
      const outEdges = {};
      EDGES.forEach((e, i) => {
        if (!outEdges[e.from]) outEdges[e.from] = [];
        outEdges[e.from].push(i);
      });
      const nodeIdxById = Object.fromEntries(
        NODES.map((n, i) => [n.id, i]),
      );
      const navEl = document.getElementById("nav-btns");

      function makeBtn(label, key, cls, onclick) {
        const b = document.createElement("button");
        b.className = cls;
        b.innerHTML = `${label} <kbd>${key}</kbd>`;
        b.onclick = onclick;
        return b;
      }

      function updateNav() {
        navEl.innerHTML = "";
        if (selType === "edge") {
          const tgtId = EDGES[selIdx].to;
          const tgtIdx = nodeIdxById[tgtId];
          navEl.appendChild(makeBtn("Next", "Space", "btn-next", () => {
            if (tgtIdx != null) selectNode(tgtIdx);
          }));
        } else if (selType === "node") {
          const edges = outEdges[NODES[selIdx].id] || [];
          if (edges.length === 0) {
            navEl.appendChild(
              makeBtn(
                "Restart",
                "Space",
                "btn-next",
                () => selectNode(0),
              ),
            );
          } else if (edges.length === 1) {
            navEl.appendChild(
              makeBtn(
                "Next",
                "Space",
                "btn-next",
                () => selectEdge(edges[0]),
              ),
            );
          } else {
            edges.forEach((ei, i) => {
              const lbl = EDGES[ei].label ||
                nodesById[EDGES[ei].to]?.label || "?";
              navEl.appendChild(
                makeBtn(
                  lbl,
                  i < 9 ? String(i + 1) : "",
                  "btn-branch",
                  () => selectEdge(ei),
                ),
              );
            });
          }
        }
      }

      // Patch select functions to update nav
      const _selectNode = selectNode, _selectEdge = selectEdge;
      selectNode = function (idx) {
        _selectNode(idx);
        updateNav();
      };
      selectEdge = function (idx) {
        _selectEdge(idx);
        updateNav();
      };

      document.addEventListener("keydown", (e) => {
        if (e.key === " ") {
          e.preventDefault();
          const first = navEl.querySelector("button");
          if (first) first.click();
        }
        if (e.key >= "1" && e.key <= "9") {
          const btns = navEl.querySelectorAll("button");
          const idx = parseInt(e.key) - 1;
          if (btns[idx]) {
            e.preventDefault();
            btns[idx].click();
          }
        }
      });

      document.getElementById("doc-title").textContent = TITLE;
      document.title = TITLE;
      if (NODES.length > 0) selectNode(0);
      if (DOC_URL) {
        const a = document.createElement("a");
        a.className = "doc-link";
        a.href = DOC_URL;
        a.target = "_blank";
        a.textContent = "Docs \u2197";
        document.querySelector(".toolbar").insertBefore(a, elC);
      }
    </script>
  </body>
</html>
