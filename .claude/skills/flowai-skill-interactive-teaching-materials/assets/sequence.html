<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITLE</title>
    <script
      src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3/dist/svg.min.js"
    ></script>
    <style>
      :root {
        --font:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        --bg: #fff;
        --surface: #f9fafb;
        --code-bg: #f3f4f6;
        --border: #e5e7eb;
        --line: #d1d5db;
        --muted: #9ca3af;
        --text: #111827;
        --text-2: #374151;
        --text-3: #4b5563;
        --sub: #6b7280;
        --accent: #2563eb;
        --accent-bg: rgba(37, 99, 235, 0.05);
        --hover-bg: rgba(0, 0, 0, 0.04);
        --insp: 380px;
        --r: 8px;
        --r-sm: 4px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .toolbar {
        height: 52px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 12px;
        flex-shrink: 0;
      }
      .title {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.01em;
        flex: 1;
      }
      .doc-link {
        font-size: 12px;
        color: var(--accent);
        text-decoration: none;
        border: 1px solid rgba(37, 99, 235, 0.4);
        padding: 4px 8px;
        border-radius: var(--r-sm);
        font-weight: 600;
      }
      .doc-link:hover {
        background: var(--accent-bg);
      }
      .counter {
        font-size: 12px;
        color: var(--sub);
        font-variant-numeric: tabular-nums;
      }
      .nav-btns {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 16px;
        border-top: 1px solid var(--border);
      }
      .btn-next {
        background: var(--text);
        color: white;
        border: none;
        padding: 4px 12px;
        border-radius: var(--r-sm);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: var(--font);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-next:hover {
        background: var(--accent);
      }
      .btn-next kbd {
        background: rgba(255, 255, 255, 0.2);
        padding: 0 4px;
        border-radius: 2px;
        font-size: 11px;
        font-family: var(--font);
      }
      .workspace {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      .diagram-wrap {
        flex: 1;
        overflow: auto;
        background: var(--surface);
        display: flex;
        justify-content: center;
        padding: 32px;
      }
      svg {
        display: block;
        background: white;
        border: 1px solid var(--border);
        border-radius: var(--r);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      }
      .inspector {
        width: var(--insp);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: white;
      }
      .insp-hd {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }
      .insp-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--sub);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 4px;
      }
      .insp-title {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.3;
      }
      .insp-body {
        flex: 1;
        overflow: auto;
      }
      .insp-desc {
        padding: 16px;
        font-size: 13px;
        line-height: 1.65;
        color: var(--text-3);
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .insp-details {
        padding: 16px;
        font-size: 13px;
        line-height: 1.6;
        color: var(--text-2);
      }
      .insp-details.empty {
        display: none;
      }
      .insp-details p {
        margin: 0 0 8px;
      }
      .insp-details p:last-child {
        margin-bottom: 0;
      }
      .insp-details h4 {
        font-size: 11px;
        font-weight: 700;
        margin: 16px 0 4px;
        color: var(--text);
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .insp-details h4:first-child {
        margin-top: 0;
      }
      .insp-details pre {
        font-family: var(--mono);
        font-size: 11px;
        background: var(--code-bg);
        padding: 8px 12px;
        border-radius: var(--r-sm);
        overflow-x: auto;
        margin: 8px 0;
        white-space: pre-wrap;
        line-height: 1.5;
      }
      .insp-details code {
        font-family: var(--mono);
        font-size: 12px;
        background: var(--code-bg);
        padding: 0 4px;
        border-radius: 2px;
      }
      .insp-details ul, .insp-details ol {
        margin: 8px 0 8px 20px;
      }
      .insp-details li {
        margin: 4px 0;
      }
      .insp-details strong {
        font-weight: 700;
      }
      .insp-details .jk {
        color: #a11;
        font-weight: 600;
      }
      .insp-details .js {
        color: #1a5;
      }
      .insp-details .jn {
        color: #161;
      }
      .insp-details .jb {
        color: #b62;
      }
      .insp-details .jz {
        color: #999;
      }

      .lifeline {
        stroke: var(--line);
        stroke-width: 1;
        stroke-dasharray: 4 4;
      }
      .actor-box {
        fill: white;
        stroke: var(--text);
        stroke-width: 1.5;
      }
      .actor-text {
        font-size: 13px;
        font-weight: 700;
        text-anchor: middle;
        fill: var(--text);
        font-family: var(--font);
      }
      .step-group {
        cursor: pointer;
      }
      .step-bg {
        fill: transparent;
        transition: fill 0.15s;
      }
      .step-group:hover .step-bg {
        fill: var(--hover-bg);
      }
      .step-group.active .step-bg {
        fill: var(--accent-bg);
      }
      .step-line {
        fill: none;
        stroke: var(--muted);
        stroke-width: 1.5;
        transition: stroke 0.15s, stroke-width 0.15s;
      }
      .step-group:hover .step-line {
        stroke: var(--text);
        stroke-width: 2;
      }
      .step-group.active .step-line {
        stroke: var(--accent);
        stroke-width: 2;
      }
      .step-name {
        font-size: 12px;
        font-weight: 500;
        text-anchor: middle;
        fill: var(--text);
        font-family: var(--font);
        transition: fill 0.15s;
      }
      .step-group:hover .step-name {
        font-weight: 600;
      }
      .step-group.active .step-name {
        fill: var(--accent);
        font-weight: 700;
      }
      .step-prev {
        font-size: 10px;
        font-family: var(--mono);
        fill: var(--sub);
        text-anchor: middle;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--line);
        border-radius: var(--r-sm);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div class="title" id="doc-title"></div>
      <div class="counter" id="counter"></div>
    </div>
    <div class="workspace">
      <div class="diagram-wrap" id="diagram"></div>
      <div class="inspector">
        <div class="insp-hd">
          <div class="insp-label">Details</div>
          <div class="insp-title" id="insp-title">Select a step</div>
        </div>
        <div class="insp-body">
          <div class="insp-desc" id="insp-desc">
            Click any step to see what happens and why.
          </div>
          <div class="insp-details empty" id="insp-det"></div>
          <div class="nav-btns" id="nav-btns"></div>
        </div>
      </div>
    </div>
    <script>
      // === DATA ===
      const TITLE = "OAuth 2.0 Authorization Code + PKCE";
      const DOC_URL = "https://datatracker.ietf.org/doc/html/rfc7636";

      const ACTORS = ["Client", "Auth Server", "Resource Server"];

      const STEPS = [
        {
          name: "Authorization Request",
          from: "Client",
          to: "Auth Server",
          preview: "GET /authorize",
          description:
            "Client redirects the user's browser to the authorization server with a PKCE code challenge. This starts the flow - the user will authenticate directly with the auth server, never exposing credentials to the client.",
          details: `<h4>Redirect Parameters</h4>
<pre>GET /authorize?response_type=code
  &amp;client_id=spa_client_01
  &amp;redirect_uri=https://app.example.com/callback
  &amp;scope=openid profile email
  &amp;state=af0ifjsldkj
  &amp;code_challenge=E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM
  &amp;code_challenge_method=S256</pre>
<p><code>code_challenge</code> is <code>base64url(SHA-256(code_verifier))</code>. The client stores the random <code>code_verifier</code> in its session - only the hash travels through the browser, preventing interception even if the redirect is compromised.</p>
<p><code>state</code> is a random string echoed back in step 4 - protects against CSRF.</p>`,
        },
        {
          name: "Login Page",
          from: "Auth Server",
          to: "Client",
          preview: "200 OK (HTML form)",
          description:
            "The authorization server presents its own login UI. The client application never sees the user's credentials - this is the core security property of the authorization code flow.",
          details: `<h4>What the server validates first</h4>
<ul>
<li><code>client_id</code> exists and is not revoked</li>
<li><code>redirect_uri</code> exactly matches a pre-registered callback URL</li>
<li>Requested <code>scope</code> values are within the client's allowed scopes</li>
</ul>
<p>If any check fails, the server shows an error page directly - it does NOT redirect back, to prevent open-redirect attacks.</p>`,
        },
        {
          name: "User Authenticates",
          from: "Client",
          to: "Auth Server",
          preview: "POST /login (credentials)",
          description:
            "User submits credentials directly to the auth server. Multi-factor authentication happens here if configured - the OAuth flow pauses until all factors are verified.",
          details: `<h4>Authentication Request</h4>
<pre>POST /login
Content-Type: application/x-www-form-urlencoded

username=alice&amp;password=***&amp;csrf_token=xyz789</pre>
<p>This is a direct browser-to-server POST. After successful authentication, the server may prompt for consent if the requested scopes haven't been approved before.</p>
<p>The consent screen shows exactly which permissions the app is requesting - the user can selectively deny scopes.</p>`,
        },
        {
          name: "Authorization Code",
          from: "Auth Server",
          to: "Client",
          preview: "302 Found (code=...)",
          description:
            "Auth server redirects back to the client's registered callback URL with a short-lived, single-use authorization code.",
          details: `<h4>Redirect Response</h4>
<pre>HTTP/1.1 302 Found
Location: https://app.example.com/callback
  ?code=SplxlOBeZQQYbYS6WxSbIA
  &amp;state=af0ifjsldkj</pre>
<p>The authorization code is single-use and short-lived (typically 30-60 seconds). It is bound to the <code>client_id</code> and <code>redirect_uri</code> - it cannot be used by a different client.</p>
<p>The client MUST verify that <code>state</code> matches the value sent in step 1. A mismatch means CSRF - abort the flow.</p>`,
        },
        {
          name: "Token Exchange",
          from: "Client",
          to: "Auth Server",
          preview: "POST /token (code + verifier)",
          description:
            "Client exchanges the authorization code for tokens. This is a back-channel request (server-to-server), not through the browser - the code_verifier proves the same client that started the flow is completing it.",
          details: `<h4>Token Request</h4>
<pre>POST /token
Content-Type: application/x-www-form-urlencoded

grant_type=authorization_code
&amp;code=SplxlOBeZQQYbYS6WxSbIA
&amp;redirect_uri=https://app.example.com/callback
&amp;client_id=spa_client_01
&amp;code_verifier=dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk</pre>
<p>The server hashes <code>code_verifier</code> and compares with the <code>code_challenge</code> from step 1. This is the PKCE proof - even without a client secret, it prevents stolen authorization codes from being exchanged by an attacker.</p>`,
        },
        {
          name: "Tokens Issued",
          from: "Auth Server",
          to: "Client",
          preview: "200 OK (access + refresh + id)",
          description:
            "Auth server returns three tokens: access token for API calls, refresh token for renewal, and ID token with user identity (OpenID Connect).",
          details: `<h4>Token Response</h4>
<pre>{
  "access_token":  "eyJhbGciOiJSUzI1NiJ9.eyJzdWIiOi...",
  "token_type":    "Bearer",
  "expires_in":    3600,
  "refresh_token": "8xLOxBtZp8",
  "id_token":      "eyJhbGciOiJSUzI1NiJ9.eyJpc3MiOi..."
}</pre>
<p><strong>access_token</strong> - short-lived (1 hour), used for API calls. Typically a JWT with claims.</p>
<p><strong>refresh_token</strong> - long-lived (days/months), used to get new access tokens without re-authentication. Store securely, never expose to the browser.</p>
<p><strong>id_token</strong> - JWT with user identity claims (sub, name, email). OpenID Connect extension. Validated by the client, never sent to resource servers.</p>`,
        },
        {
          name: "API Request",
          from: "Client",
          to: "Resource Server",
          preview: "GET /api (Bearer token)",
          description:
            "Client calls the protected API with the access token in the Authorization header. The token is opaque to the client - it doesn't parse or validate it.",
          details: `<h4>Authorized Request</h4>
<pre>GET /api/v1/user/profile
Host: api.example.com
Authorization: Bearer eyJhbGciOiJSUzI1NiJ9.eyJzdWIiOi...
Accept: application/json</pre>
<p>The token goes in the <code>Authorization</code> header, never in query parameters - URLs get logged by proxies and appear in browser history.</p>
<p>If the token is expired, the resource server returns <code>401</code> and the client uses the refresh token to get a new access token (back to Auth Server, no user interaction needed).</p>`,
        },
        {
          name: "Protected Resource",
          from: "Resource Server",
          to: "Client",
          preview: "200 OK (user data)",
          description:
            "Resource server validates the JWT, checks scopes, and returns the requested data. The full chain is complete - user authenticated without the client ever seeing their password.",
          details: `<h4>JWT Validation Steps</h4>
<ol>
<li>Fetch auth server's public key from <code>/.well-known/jwks.json</code> (cached)</li>
<li>Verify JWT signature (RS256)</li>
<li>Check <code>exp</code> claim - reject expired tokens</li>
<li>Check <code>aud</code> claim - token was issued for this resource server</li>
<li>Check <code>scope</code> - includes permissions required for this endpoint</li>
</ol>
<h4>Response</h4>
<pre>HTTP/1.1 200 OK
Content-Type: application/json

{
  "sub": "alice",
  "name": "Alice Smith",
  "email": "alice@example.com"
}</pre>`,
        },
      ];
      // === END DATA ===

      // Layout
      const GAP = 240,
        ML = 130,
        PT = 72,
        PB = 40,
        SH = 80,
        AW = 130,
        AH = 36;
      const svgW = ML * 2 + (ACTORS.length - 1) * GAP;
      const svgH = PT + STEPS.length * SH + PB;
      const axMap = {};
      ACTORS.forEach((a, i) => {
        axMap[a] = ML + i * GAP;
      });

      // SVG.js rendering
      const draw = SVG().addTo("#diagram").size(svgW, svgH);

      const arr = draw.marker(8, 6, (add) => {
        add.polygon("0 0, 8 3, 0 6").fill("#9ca3af");
      }).ref(7, 3).attr("orient", "auto");
      const arrA = draw.marker(8, 6, (add) => {
        add.polygon("0 0, 8 3, 0 6").fill("#2563eb");
      }).ref(7, 3).attr("orient", "auto");

      // Actors
      ACTORS.forEach((name) => {
        const x = axMap[name], g = draw.group();
        g.line(x, PT - 4, x, svgH - 20).addClass("lifeline");
        g.rect(AW, AH).move(x - AW / 2, 18).radius(4).addClass(
          "actor-box",
        );
        g.plain(name).attr({ x, y: 18 + AH / 2 + 5 }).addClass(
          "actor-text",
        );
      });

      // Steps
      let sel = -1;
      const groups = [];

      STEPS.forEach((step, i) => {
        const y = PT + i * SH + SH * 0.55;
        const x1 = axMap[step.from] ?? ML,
          x2 = axMap[step.to] ?? (svgW - ML);
        const rtl = x2 < x1,
          lx1 = rtl ? x1 - 2 : x1 + 2,
          lx2 = rtl ? x2 + 10 : x2 - 10;
        const cx = (x1 + x2) / 2;

        const g = draw.group().addClass("step-group").attr({
          id: `sg${i}`,
        });
        g.click(() => selectStep(i));
        g.rect(svgW, 62).move(0, y - 32).addClass("step-bg");
        const line = g.line(lx1, y, lx2, y).addClass("step-line")
          .marker("end", arr);
        g.plain(`${i + 1}. ${step.name}`).attr({ x: cx, y: y - 10 })
          .addClass("step-name");
        if (step.preview) {
          g.plain(step.preview).attr({ x: cx, y: y + 16 }).addClass(
            "step-prev",
          );
        }

        groups.push({ g, line });
      });

      // Inspector
      const elT = document.getElementById("insp-title"),
        elD = document.getElementById("insp-desc");
      const elDet = document.getElementById("insp-det"),
        elC = document.getElementById("counter");

      function renderDetails(det) {
        if (!det) return null;
        if (typeof det === "string") return det;
        if (Object.keys(det).length === 0) return null;
        let s = JSON.stringify(det, null, 2).replace(/&/g, "&amp;")
          .replace(/</g, "&lt;").replace(/>/g, "&gt;");
        s = s.replace(
          /("(?:\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(?:\s*:)?|\b(?:true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g,
          (m) => {
            const c = /^"/.test(m)
              ? (/:$/.test(m) ? "jk" : "js")
              : /true|false/.test(m)
              ? "jb"
              : /null/.test(m)
              ? "jz"
              : "jn";
            return `<span class="${c}">${m}</span>`;
          },
        );
        return "<pre>" + s + "</pre>";
      }

      function selectStep(idx) {
        if (idx < 0 || idx >= STEPS.length) return;
        groups.forEach(({ g, line }, i) => {
          if (i === idx) {
            g.addClass("active");
            line.marker("end", arrA);
          } else {
            g.removeClass("active");
            line.marker("end", arr);
          }
        });
        const s = STEPS[idx];
        elT.textContent = `${idx + 1}. ${s.name}`;
        elD.textContent = s.description || "";
        const html = renderDetails(s.details);
        if (html) {
          elDet.innerHTML = html;
          elDet.classList.remove("empty");
        } else {
          elDet.innerHTML = "";
          elDet.classList.add("empty");
        }
        elC.textContent = `${idx + 1} / ${STEPS.length}`;
        sel = idx;
        document.getElementById(`sg${idx}`)?.scrollIntoView({
          behavior: "smooth",
          block: "nearest",
        });
      }

      // Navigation in inspector
      const navEl = document.getElementById("nav-btns");
      function updateNav() {
        navEl.innerHTML = "";
        const label = sel >= STEPS.length - 1 ? "Restart" : "Next";
        const target = sel >= STEPS.length - 1 ? 0 : sel + 1;
        const b = document.createElement("button");
        b.className = "btn-next";
        b.innerHTML = `${label} <kbd>Space</kbd>`;
        b.onclick = () => selectStep(target);
        navEl.appendChild(b);
      }
      const _sel = selectStep;
      selectStep = function (idx) {
        _sel(idx);
        updateNav();
      };

      document.addEventListener("keydown", (e) => {
        if (e.key === " ") {
          e.preventDefault();
          navEl.querySelector("button")?.click();
        }
        if (e.key === "ArrowRight" || e.key === "ArrowDown") {
          e.preventDefault();
          navEl.querySelector("button")?.click();
        }
        if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
          e.preventDefault();
          selectStep(Math.max(0, sel - 1));
        }
      });

      // Init
      document.getElementById("doc-title").textContent = TITLE;
      document.title = TITLE;
      if (STEPS.length > 0) selectStep(0);
      if (DOC_URL) {
        const a = document.createElement("a");
        a.className = "doc-link";
        a.href = DOC_URL;
        a.target = "_blank";
        a.textContent = "Docs \u2197";
        document.querySelector(".toolbar").insertBefore(a, elC);
      }
    </script>
  </body>
</html>
