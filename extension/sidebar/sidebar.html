<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>FoxCode</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="connection-error" class="connection-error">
    <div class="connection-error-title">No connection to Claude Code</div>
    <div class="connection-error-hint">Start Claude Code with FoxCode channel:</div>
    <pre class="connection-error-cmd">claude --dangerously-load-development-channels plugin:foxcode@korchasa</pre>
    <div class="connection-error-hint">Make sure <code>.mcp.json</code> has the foxcode server:</div>
    <pre class="connection-error-cmd">MCP server loads automatically via plugin.
Install: /plugin install foxcode@korchasa</pre>
    <div class="connection-error-status">Reconnecting...</div>
  </div>
  <div id="messages"></div>
  <div id="composer">
    <form id="input-form">
      <textarea id="input" rows="1" placeholder="Ask a question about this page..." autocomplete="off"></textarea>
    </form>
  </div>
  <script src="markdown.js"></script>
  <script src="format.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
