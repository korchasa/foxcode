<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>FoxCode</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="server-bar" class="server-bar">
    <button id="server-indicator" class="server-indicator" title="Connection settings">No connection</button>
  </div>
  <div id="settings-form" class="settings-form hidden">
    <div class="settings-title">Connection Settings</div>
    <label class="settings-label">Port <input id="settings-port" type="number" min="1" max="65535" class="settings-input"></label>
    <label class="settings-label">Password <input id="settings-password" type="text" class="settings-input"></label>
    <button id="settings-connect" class="settings-connect-btn">Connect</button>
  </div>
  <div id="connection-error" class="connection-error">
    <div class="connection-error-title">No connection to Claude Code</div>
    <div id="connection-diag" class="connection-diag"></div>
    <div class="connection-error-status">Reconnecting...</div>
  </div>
  <div id="channels-warning" class="channels-warning hidden">
    <div class="channels-warning-title">Channels not enabled</div>
    <div class="channels-warning-text">Messages from this sidebar won't reach Claude Code. CC&nbsp;&rarr;&nbsp;Browser tools (reply, evalInBrowser) work normally.</div>
  </div>
  <div id="messages"></div>
  <div id="composer">
    <form id="input-form">
      <textarea id="input" rows="1" placeholder="Ask a question about this page..." autocomplete="off"></textarea>
    </form>
  </div>
  <script src="markdown.js"></script>
  <script src="format.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
