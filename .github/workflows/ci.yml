name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: channel/package-lock.json

      - name: Install channel dependencies
        run: npm ci
        working-directory: channel

      - name: Run channel tests
        run: node --test lib.test.mjs validator.test.mjs
        working-directory: channel

      - name: Run extension tests
        run: node --test background/browser-api.test.js background/dom-helpers.test.js sidebar/markdown.test.js
        working-directory: extension

  auto-release:
    needs: test
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for releasable commits
        id: check
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "releasable=true" >> "$GITHUB_OUTPUT"
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            HAS_FEAT=$(git log --oneline "${LATEST_TAG}..HEAD" | grep -cE "^[0-9a-f]+ feat" || true)
            HAS_FIX=$(git log --oneline "${LATEST_TAG}..HEAD" | grep -cE "^[0-9a-f]+ (fix|perf|refactor|build)" || true)
            if [ "$HAS_FEAT" -gt 0 ]; then
              echo "releasable=true" >> "$GITHUB_OUTPUT"
              echo "bump=minor" >> "$GITHUB_OUTPUT"
            elif [ "$HAS_FIX" -gt 0 ]; then
              echo "releasable=true" >> "$GITHUB_OUTPUT"
              echo "bump=patch" >> "$GITHUB_OUTPUT"
            else
              echo "releasable=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Bump version and tag
        if: steps.check.outputs.releasable == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "${{ steps.check.outputs.bump }}" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          jq --arg v "$NEW_VERSION" '.version = $v' extension/manifest.json > tmp.json && mv tmp.json extension/manifest.json
          jq --arg v "$NEW_VERSION" '.version = $v' channel/package.json > tmp.json && mv tmp.json channel/package.json

          git add extension/manifest.json channel/package.json
          git commit -m "chore(release): v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push --follow-tags origin main

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set extension version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' extension/manifest.json > tmp.json && mv tmp.json extension/manifest.json

      - name: Build extension .xpi
        run: cd extension && zip -r ../foxcode-extension.xpi . -x '*.test.js'

      - name: Upload extension artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: foxcode-extension
          path: foxcode-extension.xpi

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: foxcode-extension

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: foxcode-extension.xpi
          generate_release_notes: true

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
        working-directory: channel

      - name: Publish foxcode-channel to npm
        run: npm publish --access public
        working-directory: channel
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
