name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: foxcode/channel/package-lock.json

      - name: Install channel dependencies
        run: npm ci
        working-directory: foxcode/channel

      - name: Run channel tests
        run: node --test lib.test.mjs validator.test.mjs
        working-directory: foxcode/channel

      - name: Run extension tests
        run: node --test background/browser-api.test.js background/dom-helpers.test.js sidebar/markdown.test.js
        working-directory: extension

  auto-release:
    needs: test
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: foxcode/channel/package-lock.json

      - name: Check for releasable commits
        id: check
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "releasable=true" >> "$GITHUB_OUTPUT"
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            HAS_FEAT=$(git log --oneline "${LATEST_TAG}..HEAD" | grep -cE "^[0-9a-f]+ feat" || true)
            HAS_FIX=$(git log --oneline "${LATEST_TAG}..HEAD" | grep -cE "^[0-9a-f]+ (fix|perf|refactor|build)" || true)
            if [ "$HAS_FEAT" -gt 0 ]; then
              echo "releasable=true" >> "$GITHUB_OUTPUT"
              echo "bump=minor" >> "$GITHUB_OUTPUT"
            elif [ "$HAS_FIX" -gt 0 ]; then
              echo "releasable=true" >> "$GITHUB_OUTPUT"
              echo "bump=patch" >> "$GITHUB_OUTPUT"
            else
              echo "releasable=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Bump version and tag
        id: version
        if: steps.check.outputs.releasable == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "${{ steps.check.outputs.bump }}" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

          jq --arg v "$NEW_VERSION" '.version = $v' extension/manifest.json > tmp.json && mv tmp.json extension/manifest.json
          jq --arg v "$NEW_VERSION" '.version = $v' foxcode/channel/package.json > tmp.json && mv tmp.json foxcode/channel/package.json
          jq --arg v "$NEW_VERSION" '.version = $v' foxcode/.claude-plugin/plugin.json > tmp.json && mv tmp.json foxcode/.claude-plugin/plugin.json

          git add extension/manifest.json foxcode/channel/package.json foxcode/.claude-plugin/plugin.json
          if git diff --cached --quiet; then
            echo "Files already at v${NEW_VERSION}, skipping commit"
          else
            git commit -m "chore(release): v${NEW_VERSION}"
          fi
          git tag -f "v${NEW_VERSION}"
          git push --follow-tags origin main

      - name: Build extension .xpi
        if: steps.check.outputs.releasable == 'true'
        run: cd extension && zip -r ../foxcode-extension.xpi . -x '*.test.js'

      - name: Create GitHub Release
        if: steps.check.outputs.releasable == 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: foxcode-extension.xpi
          generate_release_notes: true

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build extension .xpi
        run: cd extension && zip -r ../foxcode-extension.xpi . -x '*.test.js'

      - name: Upload extension artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: foxcode-extension
          path: foxcode-extension.xpi
