name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: channel/package-lock.json

      - name: Install channel dependencies
        run: npm ci
        working-directory: channel

      - name: Run channel tests
        run: node --test lib.test.mjs validator.test.mjs
        working-directory: channel

      - name: Run extension tests
        run: node --test background/browser-api.test.js background/dom-helpers.test.js sidebar/markdown.test.js
        working-directory: extension

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set extension version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' extension/manifest.json > tmp.json && mv tmp.json extension/manifest.json

      - name: Build extension .xpi
        run: cd extension && zip -r ../foxcode-extension.xpi . -x '*.test.js'

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: foxcode-extension
          path: foxcode-extension.xpi

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: foxcode-extension

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: foxcode-extension.xpi
          generate_release_notes: true

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
        working-directory: channel

      - name: Publish foxcode-channel to npm
        run: npm publish --access public
        working-directory: channel
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
