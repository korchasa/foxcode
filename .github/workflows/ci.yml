name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      channel_version:
        description: 'foxcode-channel version to publish (e.g. 0.18.0-rc.1 or 0.18.0). Prereleases (containing "-") publish to dist-tag rc; clean SemVer publishes to latest. Leave empty to skip publish.'
        required: false
        type: string
        default: ''
      deprecate_range:
        description: 'foxcode-channel SemVer range to deprecate, e.g. <=0.4.2. Leave empty to skip deprecate. Requires deprecate_message.'
        required: false
        type: string
        default: ''
      deprecate_message:
        description: 'Deprecation message shown by npm on install. Required if deprecate_range is set.'
        required: false
        type: string
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: foxcode/channel/package-lock.json

      - name: Install channel dependencies
        run: npm ci
        working-directory: foxcode/channel

      - name: Run checks
        run: bash scripts/check.sh

  auto-release:
    needs: test
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: foxcode/channel/package-lock.json

      - name: Check for releasable commits
        id: check
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "releasable=true" >> "$GITHUB_OUTPUT"
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            HAS_FEAT=$(git log --oneline "${LATEST_TAG}..HEAD" | grep -cE "^[0-9a-f]+ feat" || true)
            HAS_FIX=$(git log --oneline "${LATEST_TAG}..HEAD" | grep -cE "^[0-9a-f]+ (fix|perf|refactor|build)" || true)
            if [ "$HAS_FEAT" -gt 0 ]; then
              echo "releasable=true" >> "$GITHUB_OUTPUT"
              echo "bump=minor" >> "$GITHUB_OUTPUT"
            elif [ "$HAS_FIX" -gt 0 ]; then
              echo "releasable=true" >> "$GITHUB_OUTPUT"
              echo "bump=patch" >> "$GITHUB_OUTPUT"
            else
              echo "releasable=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Bump version and tag (lockstep across plugin/channel/opencode/.mcp.json)
        id: version
        if: steps.check.outputs.releasable == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "${{ steps.check.outputs.bump }}" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

          # JSON file-set: extension manifest + plugin + channel + lockfile + opencode package.
          jq --arg v "$NEW_VERSION" '.version = $v' foxcode/extension/manifest.json > tmp.json && mv tmp.json foxcode/extension/manifest.json
          jq --arg v "$NEW_VERSION" '.version = $v' foxcode/channel/package.json > tmp.json && mv tmp.json foxcode/channel/package.json
          jq --arg v "$NEW_VERSION" '.version = $v | .packages[""].version = $v' foxcode/channel/package-lock.json > tmp.json && mv tmp.json foxcode/channel/package-lock.json
          jq --arg v "$NEW_VERSION" '.version = $v' foxcode/.claude-plugin/plugin.json > tmp.json && mv tmp.json foxcode/.claude-plugin/plugin.json
          jq --arg v "$NEW_VERSION" '.version = $v' opencode/package.json > tmp.json && mv tmp.json opencode/package.json

          # Pin literals: foxcode-channel@<old> -> foxcode-channel@<new>.
          # All three files carry an exact pin that gates the channel
          # version downstream IDEs resolve. Must move in lockstep with
          # foxcode/channel/package.json above; release.sh:PIN_FILES is
          # the source of the same list.
          for pin_file in foxcode/.mcp.json scripts/build-plugin-payload.mjs opencode/lib/foxcode-mcp-entry.mjs README.md; do
            sed -i -E "s/foxcode-channel@[0-9A-Za-z.\\-]+/foxcode-channel@${NEW_VERSION}/g" "$pin_file"
          done

          git add foxcode/extension/manifest.json foxcode/channel/package.json foxcode/channel/package-lock.json foxcode/.claude-plugin/plugin.json opencode/package.json foxcode/.mcp.json scripts/build-plugin-payload.mjs opencode/lib/foxcode-mcp-entry.mjs README.md
          if git diff --cached --quiet; then
            echo "Files already at v${NEW_VERSION}, skipping commit"
          else
            git commit -m "chore(release): v${NEW_VERSION}"
          fi
          git tag -f "v${NEW_VERSION}"
          git push --follow-tags origin main

      - name: Publish foxcode-channel to npm (latest)
        if: steps.check.outputs.releasable == 'true'
        working-directory: foxcode/channel
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Idempotency: if the version was already published out-of-band
          # (via workflow_dispatch for rc → promote-to-stable), skip the
          # publish step. The post-publish gate below still verifies the
          # tarball is on the registry, so silent skip is impossible.
          if npm view "foxcode-channel@${NEW_VERSION}" version >/dev/null 2>&1; then
            echo "foxcode-channel@${NEW_VERSION} already on registry — skipping publish"
            exit 0
          fi
          npm publish --access public --tag latest

      - name: Post-publish gate (P0.8) — registry must list the new version
        if: steps.check.outputs.releasable == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            if npm view "foxcode-channel@${NEW_VERSION}" dist.tarball >/dev/null 2>&1; then
              echo "Verified: foxcode-channel@${NEW_VERSION} on the registry"
              exit 0
            fi
            echo "Attempt ${attempt}: not yet visible on registry, sleeping 10s"
            sleep 10
          done
          echo "FAIL: foxcode-channel@${NEW_VERSION} not found on registry after 60s" >&2
          exit 1

      - name: Build extension .xpi
        if: steps.check.outputs.releasable == 'true'
        run: cd foxcode/extension && zip -r ../../foxcode-extension.xpi . -x '*.test.js'

      - name: Create GitHub Release
        if: steps.check.outputs.releasable == 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: foxcode-extension.xpi
          generate_release_notes: true

  channel-publish:
    # Manual channel-only publish path. Used for prerelease (rc) and
    # out-of-band stable publishes that must NOT bump the plugin SemVer.
    # The auto-release path above handles the in-line plugin+channel lockstep
    # release on every push to main.
    needs: test
    if: github.event_name == 'workflow_dispatch' && inputs.channel_version != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: foxcode/channel/package-lock.json

      - name: Validate channel_version input
        env:
          CHANNEL_VERSION: ${{ github.event.inputs.channel_version }}
        run: |
          if [ -z "$CHANNEL_VERSION" ]; then
            echo "channel_version input is required" >&2
            exit 1
          fi
          if ! echo "$CHANNEL_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "channel_version is not SemVer: $CHANNEL_VERSION" >&2
            exit 1
          fi
          # Registry collision check: do not re-publish an existing version.
          if npm view "foxcode-channel@${CHANNEL_VERSION}" version >/dev/null 2>&1; then
            echo "foxcode-channel@${CHANNEL_VERSION} already exists on the registry" >&2
            exit 1
          fi

      - name: Write channel version into package.json
        env:
          CHANNEL_VERSION: ${{ github.event.inputs.channel_version }}
        run: |
          jq --arg v "$CHANNEL_VERSION" '.version = $v' foxcode/channel/package.json > tmp.json && mv tmp.json foxcode/channel/package.json
          jq --arg v "$CHANNEL_VERSION" '.version = $v | .packages[""].version = $v' foxcode/channel/package-lock.json > tmp.json && mv tmp.json foxcode/channel/package-lock.json

      - name: Derive npm dist-tag from version
        id: dist
        env:
          CHANNEL_VERSION: ${{ github.event.inputs.channel_version }}
        run: |
          # Prereleases (contain "-") publish to dist-tag rc to keep latest clean.
          if echo "$CHANNEL_VERSION" | grep -q '-'; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish foxcode-channel to npm
        working-directory: foxcode/channel
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ steps.dist.outputs.tag }}
        run: |
          # DIST_TAG is constrained to "rc" or "latest" by the previous step;
          # still passed via env for the no-direct-interpolation pattern.
          npm publish --access public --tag "$DIST_TAG"

      - name: Post-publish gate (P0.8) — registry must list the new version
        env:
          CHANNEL_VERSION: ${{ github.event.inputs.channel_version }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            if npm view "foxcode-channel@${CHANNEL_VERSION}" dist.tarball >/dev/null 2>&1; then
              echo "Verified: foxcode-channel@${CHANNEL_VERSION} on the registry"
              exit 0
            fi
            echo "Attempt ${attempt}: not yet visible on registry, sleeping 10s"
            sleep 10
          done
          echo "FAIL: foxcode-channel@${CHANNEL_VERSION} not found on registry after 60s" >&2
          exit 1

  channel-deprecate:
    # Manual one-shot deprecate path (Phase 0 P0.10 and any future
    # post-publish hygiene). Marks a SemVer range of foxcode-channel as
    # deprecated on the npm registry with the supplied message. Keeps
    # NPM_TOKEN in CI only (D0.3).
    needs: test
    if: github.event_name == 'workflow_dispatch' && inputs.deprecate_range != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Validate deprecate inputs
        env:
          RANGE: ${{ inputs.deprecate_range }}
          MSG: ${{ inputs.deprecate_message }}
        run: |
          if [ -z "$MSG" ]; then
            echo "deprecate_message is required when deprecate_range is set" >&2
            exit 1
          fi
          # Whitelist SemVer-range characters; rejects shell-meta and quotes.
          if ! echo "$RANGE" | grep -qE '^[][<>=! 0-9A-Za-z.,|^~*\\-]+$'; then
            echo "deprecate_range contains characters outside the SemVer-range whitelist: $RANGE" >&2
            exit 1
          fi

      - name: npm deprecate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RANGE: ${{ inputs.deprecate_range }}
          MSG: ${{ inputs.deprecate_message }}
        run: npm deprecate "foxcode-channel@${RANGE}" "$MSG"

      - name: Verify deprecation appears on registry
        env:
          RANGE: ${{ inputs.deprecate_range }}
        run: |
          # Pick a concrete version from the range to verify the deprecation
          # text was recorded. For the canonical Phase-0 case `<=0.4.2`,
          # 0.4.2 itself is a stable probe.
          PROBE=$(echo "$RANGE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | tail -1)
          if [ -z "$PROBE" ]; then
            echo "Could not extract a concrete probe version from range '$RANGE'; skipping verify"
            exit 0
          fi
          for attempt in 1 2 3 4 5 6; do
            DEP=$(npm view "foxcode-channel@${PROBE}" deprecated 2>/dev/null || true)
            if [ -n "$DEP" ]; then
              echo "Verified: foxcode-channel@${PROBE} carries deprecation: $DEP"
              exit 0
            fi
            echo "Attempt ${attempt}: deprecation not yet visible for ${PROBE}, sleeping 10s"
            sleep 10
          done
          echo "FAIL: deprecation not visible on foxcode-channel@${PROBE} after 60s" >&2
          exit 1

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build extension .xpi
        run: cd foxcode/extension && zip -r ../../foxcode-extension.xpi . -x '*.test.js'

      - name: Upload extension artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: foxcode-extension
          path: foxcode-extension.xpi
